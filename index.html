html{

h1{

.subtitle{

}

.copybox span{
  display:block;
  font-size:13px;
  margin-top:5px;

}

.nav{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(255,255,255,.96);

  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  padding:13px;
  border-bottom:1px solid #e5e7eb;
  box-shadow:0 8px 20px rgba(15,23,42,.08);
}

.nav a{
  text-decoration:none;
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fed7aa;
  border-radius:999px;
  padding:9px 14px;
  font-weight:800;
}

.nav a:hover{
  background:#c2410c;
  color:white;
}

.wrap{
  max-width:1180px;
  margin:32px auto 70px;
  padding:0 16px;
}

.card{
  background:white;
  border:1px solid #fed7aa;
  border-radius:26px;
  padding:26px;
  margin-bottom:32px;

  padding-bottom:16px;
  margin-bottom:18px;

h2{
  margin:0;
  color:#9a3412;
  font-size:26px;
}

.desc{

  border-radius:999px;

  font-weight:800;
  font-size:13px;
}

.q{
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:18px;
  margin:16px 0;
  background:#fff;
}

.q:hover{
  border-color:#fdba74;
  box-shadow:0 10px 24px rgba(249,115,22,.10);
}

  display:inline-block;
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fed7aa;
  border-radius:999px;
  padding:4px 9px;
  font-size:12px;
  font-weight:800;
  margin-bottom:8px;
}

.qtitle{
  font-weight:800;
  margin-bottom:10px;
  color:#111827;
}

.opt{
  display:block;
  margin:7px 0;
  padding:10px 12px;
  border-radius:12px;
  background:#fafafa;
  border:1px solid #f1f5f9;
  cursor:pointer;
}

.opt:hover{
  background:#fff7ed;
  border-color:#fdba74;
}

.opt input{
  margin-right:8px;
}

.btn{
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,#ea580c,#ca8a04);
  color:white;
  font-size:16px;
  font-weight:800;
  padding:13px 22px;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(234,88,12,.25);
}

.btn:hover{
  transform:translateY(-1px);
}

.result{
  margin-top:22px;
}

.summary{
  background:#ecfdf5;
  border:1px solid #86efac;
  border-left:6px solid #22c55e;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

  margin:0;
  color:#15803d;
  font-size:24px;

.ans{

  border:1px solid #e5e7eb;

  border-color:#86efac;

.bad{

.badtxt{

  margin:34px 0 0;
  font-size:14px;

    font-size:22px;

function norm(t){
  return String(t || "")
    .toLowerCase()
    .replace(/\s+/g," ")
    .replace(/[.,;:!?()«»"']/g,"")
    .trim();
}
  function shuffle(arr){
  const a = [...arr];

  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

function render(){
  const nav = document.getElementById("nav");
  const app = document.getElementById("app");

  nav.innerHTML = DATA
    .map((variant, i) => `<a href="#v${i + 1}">${variant.title}</a>`)
    .join("");

  app.innerHTML = DATA.map((variant, vi) => {
    const questionsHTML = variant.items.map((item, qi) => {
      const opts = shuffle(item.options);
      item.renderedOptions = opts;
      item.correctIndex = opts.findIndex(opt => norm(opt) === norm(item.a));

      return `
        <div class="q">
          <div class="qtitle">${qi + 1}. ${item.q}</div>

          ${opts.map((opt, oi) => `
            <label class="opt">
              <input type="radio" name="v${vi}-q${qi}" value="${oi}">
              ${String.fromCharCode(65 + oi)}) ${opt}
            </label>
          `).join("")}
        </div>
      `;
    }).join("");

    return `
      <section class="card" id="v${vi + 1}">
        <div class="head">
          <div>
            <h2>${variant.title}</h2>
            <div class="desc">
              Бұл вариантта 30 сұрақ бар. Барлық сұраққа жауап беріп, соңында нәтижені көріңіз.
            </div>
          </div>

          <span class="badge">${variant.items.length} сұрақ</span>
        </div>

        ${questionsHTML}

        <button class="btn" onclick="checkVariant(${vi})">Нәтижені көрсету</button>
        <div class="result" id="result-${vi}"></div>
      </section>
    `;
  }).join("") + `
    <div class="footer">
      © @elnazm_ln — Бұл сайтты көшіруге, қайта сатуға және таратуға тыйым салынады.
    </div>
  `;
}

function evidence(q, a){
  const text = norm(q + " " + a);

  if(text.includes("метатан") || text.includes("өзін өзі реттеу") || text.includes("флейвел")){
    return "Бұл сұрақ метатану және өзін-өзі реттеу ұғымдарымен байланысты. Дұрыс жауап оқушының өз оқуын түсінуі, бақылауы және реттеуі туралы.";
  }

  if(text.includes("бағалау") || text.includes("форматив") || text.includes("жиынтық") || text.includes("кері байланыс") || text.includes("интерпретация")){
    return "Бұл сұрақ бағалау тақырыбына жатады. Формативтік бағалау — оқыту үшін бағалау, жиынтық бағалау — оқуды бағалау.";
  }

  if(text.includes("сыни") || text.includes("сто") || text.includes("дәлел") || text.includes("пайым")){
    return "Бұл сұрақ сыни тұрғыдан ойлауға қатысты. Сыни ойлау ақпаратты талдау, бағалау, дәлелдеу және қорытынды жасауға негізделеді.";
  }

  if(text.includes("диалог") || text.includes("әңгіме") || text.includes("мерсер") || text.includes("александер") || text.includes("барнс")){
    return "Бұл сұрақ диалогтік оқытуға қатысты. Диалог арқылы оқушылар ой бөліседі, дәлелдейді және бірлесіп білім құрады.";
  }

  if(text.includes("выгот") || text.includes("жада") || text.includes("жақын арадағы даму")){
    return "Бұл сұрақ Выготскийдің ЖАДА ұғымымен байланысты. ЖАДА — оқушының өз бетімен және көмек арқылы орындай алатын деңгейлерінің арасы.";
  }

  if(text.includes("маслоу") || text.includes("роджерс") || text.includes("гуманист")){
    return "Бұл сұрақ гуманистік тәсілмен байланысты. Маслоу мен Роджерс адамның тұлғалық өсуі мен ішкі қажеттіліктерін маңызды деп қарастырған.";
  }

  if(text.includes("пиаге") || text.includes("когнитив")){
    return "Бұл сұрақ когнитивтік даму теориясымен байланысты. Пиаже баланың ойлауы мен танымдық дамуын зерттеген.";
  }

  if(text.includes("шульман") || text.includes("бас") || text.includes("қол") || text.includes("жүрек")){
    return "Бұл сұрақ Шульманның үш көмекшісімен байланысты: бас — кәсіби түсінік, қол — тәжірибелік дағды, жүрек — кәсіби тұтастық.";
  }

  if(text.includes("жады") || text.includes("есте") || text.includes("тулвинг") || text.includes("карпике")){
    return "Бұл сұрақ жады және есте сақтау тақырыбына қатысты. Дұрыс жауап ақпаратты сақтау, қайта жаңғырту немесе есте сақтау әдістерімен байланысты.";
  }

  if(text.includes("уәж") || text.includes("ынта") || text.includes("мотива")){
    return "Бұл сұрақ оқу мотивациясына қатысты. Ішкі уәж оқушының қызығушылығы мен өзіндік мақсаты арқылы қалыптасады.";
  }

  if(text.includes("сындарлы") || text.includes("конструктив")){
    return "Бұл сұрақ сындарлы оқытуға қатысты. Сындарлы оқытуда оқушы білімді дайын күйінде алмай, өзі құрастырады.";
  }

  return "Бұл жауап сұрақтағы негізгі педагогикалық ұғымның мағынасына сәйкес келеді.";
}

function checkVariant(vi){
  const variant = DATA[vi];
  const box = document.getElementById("result-" + vi);

  let score = 0;
  let html = "";

  variant.items.forEach((item, qi) => {
    const selected = document.querySelector(`input[name="v${vi}-q${qi}"]:checked`);
    const selectedIndex = selected ? Number(selected.value) : -1;
    const isCorrect = selectedIndex === item.correctIndex;

    if(isCorrect){
      score++;
    }

    const yourAnswer = selectedIndex >= 0
      ? `${String.fromCharCode(65 + selectedIndex)}) ${item.renderedOptions[selectedIndex]}`
      : "Жауап таңдалмаған";

    const correctAnswer = `${String.fromCharCode(65 + item.correctIndex)}) ${item.a}`;

    html += `
      <div class="ans ${isCorrect ? "ok" : "bad"}">
        <div><b>${qi + 1}. ${item.q}</b></div>

        <div class="${isCorrect ? "oktxt" : "badtxt"}">
          ${isCorrect ? "Дұрыс" : "Қате"}
        </div>

        <div class="ex">
          <b>Сіздің жауабыңыз:</b><br>
          ${yourAnswer}
        </div>

        <div class="ex">
          <b>Дұрыс жауап:</b><br>
          ${correctAnswer}
        </div>

        <div class="ex">
          <b>Түсіндірме:</b><br>
          ${evidence(item.q, item.a)}
        </div>
      </div>
    `;
  });

  const percent = Math.round((score / variant.items.length) * 100);

  box.innerHTML = `
    <div class="summary">
      <h3>${score} / ${variant.items.length} дұрыс</h3>
      <p>Нәтиже: <b>${percent}%</b></p>
    </div>

    ${html}
  `;

  box.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
}

render();

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

document.addEventListener("keydown", function(e){
  const k = e.key.toUpperCase();

  if(
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k)) ||
    (e.ctrlKey && ["U","S","P","A","C"].includes(k))
  ){
    e.preventDefault();
  }
});
</script>
