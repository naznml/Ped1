*{

html{

body{

.codes{

}

.codes span{

  font-weight:800;

h1{

}

.subtitle{
  margin:10px auto 0;
  max-width:900px;
  font-size:18px;
  opacity:.95;
}

.copybox{
  max-width:850px;
  margin:20px auto 0;
  background:#fef3c7;
  color:#78350f;
  border:2px solid #facc15;
  border-radius:18px;
  padding:15px 18px;
  font-weight:700;
}

.copybox span{
  display:block;
  font-size:13px;
  margin-top:5px;
  font-weight:500;
}

.nav{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  padding:13px;
  border-bottom:1px solid #e5e7eb;
  box-shadow:0 8px 20px rgba(15,23,42,.08);
}

.nav a{
  text-decoration:none;
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fed7aa;
  border-radius:999px;
  padding:9px 14px;
  font-weight:800;
}

.nav a:hover{
  background:#c2410c;
  color:white;
}

.wrap{
  max-width:1180px;
  margin:32px auto 70px;
  padding:0 16px;
}

.card{
  background:white;
  border:1px solid #fed7aa;
  border-radius:26px;
  padding:26px;
  margin-bottom:32px;
  box-shadow:0 18px 44px rgba(15,23,42,.11);
  scroll-margin-top:90px;
}

.head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  border-bottom:1px solid #ffedd5;
  padding-bottom:16px;
  margin-bottom:18px;
}

h2{
  margin:0;
  color:#9a3412;
  font-size:26px;
}

.desc{
  background:#fff7ed;
  border-left:6px solid #f97316;

  margin-top:10px;
  color:#374151;
}

.badge{
  background:#ffedd5;
  color:#9a3412;
  border-radius:999px;
  padding:7px 12px;
  font-weight:800;
  font-size:13px;
}

.q{
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:18px;
  margin:16px 0;
  background:#fff;
}

.q:hover{
  border-color:#fdba74;
  box-shadow:0 10px 24px rgba(249,115,22,.10);
}

.qtype{
  display:inline-block;
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fed7aa;
  border-radius:999px;
  padding:4px 9px;
  font-size:12px;
  font-weight:800;
  margin-bottom:8px;
}

.qtitle{
  font-weight:800;
  margin-bottom:10px;
  color:#111827;
}

.opt{
  display:block;
  margin:7px 0;
  padding:10px 12px;
  border-radius:12px;
  background:#fafafa;
  border:1px solid #f1f5f9;
  cursor:pointer;
}

.opt:hover{
  background:#fff7ed;
  border-color:#fdba74;
}

.opt input{
  margin-right:8px;
}

.btn{
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,#ea580c,#ca8a04);
  color:white;
  font-size:16px;
  font-weight:800;
  padding:13px 22px;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(234,88,12,.25);
}

.btn:hover{
  transform:translateY(-1px);
}

.result{
  margin-top:22px;
}

.summary{
  background:#ecfdf5;
  border:1px solid #86efac;
  border-left:6px solid #22c55e;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

.summary h3{
  margin:0;
  color:#15803d;
  font-size:24px;
}

.ans{
  border-radius:16px;
  padding:15px;
  margin:12px 0;
  border:1px solid #e5e7eb;
}

.ok{
  background:#ecfdf5;
  border-color:#86efac;
}

.bad{
  background:#fff1f2;
  border-color:#fecdd3;
}

.oktxt{
  color:#15803d;
  font-weight:800;
}

.badtxt{
  color:#be123c;
  font-weight:800;
}

.ex{
  margin-top:8px;
  font-size:15px;
}

.footer{
  text-align:center;
  color:#64748b;
  margin:34px 0 0;
  font-size:14px;

@media(max-width:720px){

.langbtn.active{

.langbtn:hover{

function t(key){
  return UI[currentLang][key];
}

function itemQuestion(item){
  return currentLang === "kk" ? item.qK : item.qR;
}

function optText(opt){
  return currentLang === "kk" ? opt.k : opt.r;
}

function variantTitle(variant){
  return currentLang === "kk" ? variant.titleK : variant.titleR;
}

function norm(t){
  return String(t || "")
    .toLowerCase()
    .replace(/\s+/g," ")
    .replace(/[.,;:!?()«»"']/g,"")
    .trim();
}

function shuffle(arr){
  const a = [...arr];

  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById("btn-kk").classList.toggle("active", lang === "kk");
  document.getElementById("btn-ru").classList.toggle("active", lang === "ru");
  document.getElementById("heroTitle").innerHTML = t("title");
  document.getElementById("heroSubtitle").innerHTML = t("subtitle");
  document.getElementById("copybox").innerHTML = t("copy");
  render();
}

function render(){
  const nav = document.getElementById("nav");
  const app = document.getElementById("app");

  nav.innerHTML = DATA
    .map((variant, i) => `<a href="#v${i + 1}">${variantTitle(variant)}</a>`)
    .join("") + `<a href="#final">${t("navTotal")}</a>`;

  app.innerHTML = DATA.map((variant, vi) => {
    const questionsHTML = variant.items.map((item, qi) => {
      if(!item.shuffledOptions){
        item.shuffledOptions = shuffle(item.options);
      }

      return `
        <div class="q">
          <div class="qtype">${currentLang === "kk" ? "Бір дұрыс жауап" : "Один правильный ответ"}</div>

          <div class="qtitle">${qi + 1}. ${itemQuestion(item)}</div>

          ${item.shuffledOptions.map((opt, oi) => `
            <label class="opt">
              <input type="radio" name="v${vi}-q${qi}" value="${opt.k}">
              ${String.fromCharCode(65 + oi)}) ${optText(opt)}
            </label>
          `).join("")}
        </div>
      `;
    }).join("");

    return `
      <section class="card" id="v${vi + 1}">
        <div class="head">
          <div>
            <h2>${variantTitle(variant)}</h2>
            <div class="desc">${t("desc")}</div>
          </div>
          <span class="badge">${variant.items.length} ${t("questionCount")}</span>
        </div>

        ${questionsHTML}

        <button class="btn" onclick="checkVariant(${vi})">${t("show")}</button>
        <div class="result" id="result-${vi}"></div>
      </section>
    `;
  }).join("") + `
    <section class="card" id="final">
      <div class="head">
        <div>
          <h2>${t("navTotal")}</h2>
          <div class="desc">${currentLang === "kk" ? "Әр варианттың нәтижесін бөлек көре аласыз." : "Результат каждого варианта можно посмотреть отдельно."}</div>
        </div>
      </div>
    </section>
    <div class="footer">${t("footer")}</div>
  `;
}

function evidence(item, correctOpt){
  const baseK = norm(item.qK + " " + correctOpt.k);
  const baseR = norm(item.qR + " " + correctOpt.r);

  if(currentLang === "ru"){
    if(baseR.includes("оцен")) return "Правильный ответ связан с оцениванием: оно помогает собирать, интерпретировать и использовать сведения о результатах обучения.";
    if(baseR.includes("метапозн") || baseR.includes("саморегуляц")) return "Правильный ответ относится к осознанному контролю собственного мышления, обучения и учебных стратегий.";
    if(baseR.includes("диалог") || baseR.includes("бесед")) return "Правильный ответ связан с диалогическим обучением, где знания развиваются через обсуждение, вопросы и аргументацию.";
    if(baseR.includes("выгот") || baseR.includes("зона ближайшего")) return "Правильный ответ связан с идеей Выготского о зоне ближайшего развития и поддержке учащегося.";
    if(baseR.includes("критичес")) return "Правильный ответ относится к критическому мышлению: анализу, оценке, доказательству и осмыслению информации.";
    if(baseR.includes("шульман")) return "Правильный ответ связан с моделью Шульмана, где важны профессиональное понимание, практические навыки и ценностная целостность учителя.";
    if(baseR.includes("маслоу") || baseR.includes("роджерс")) return "Правильный ответ относится к гуманистическому подходу, где важны личностный рост, мотивация и потребности человека.";
    if(baseR.includes("пиаже")) return "Правильный ответ связан с когнитивным развитием и идеями Жана Пиаже.";
    if(baseR.includes("мерсер")) return "Правильный ответ связан с исследованиями Мерсера о типах беседы, обсуждении и совместном построении знаний.";
    if(baseR.includes("памят") || baseR.includes("запомин")) return "Правильный ответ относится к процессам памяти и способам сохранения информации.";
    return "Этот ответ соответствует ключевому педагогическому понятию, указанному в вопросе.";
  }

  if(baseK.includes("бағалау")) return "Дұрыс жауап бағалаумен байланысты: бағалау оқу нәтижелерін жинақтап, түсіндіруге және қолдануға көмектеседі.";
  if(baseK.includes("метатану") || baseK.includes("өзін-өзі реттеу")) return "Дұрыс жауап оқушының өз ойлауын, оқуын және стратегияларын саналы бақылауымен байланысты.";
  if(baseK.includes("диалог") || baseK.includes("әңгіме")) return "Дұрыс жауап диалогтік оқытумен байланысты: білім талқылау, сұрақ қою және дәлелдеу арқылы дамиды.";
  if(baseK.includes("выгот") || baseK.includes("жақын арадағы даму")) return "Дұрыс жауап Выготскийдің жақын арадағы даму аймағы және оқушыны қолдау идеясына қатысты.";
  if(baseK.includes("сыни")) return "Дұрыс жауап сыни тұрғыдан ойлауға қатысты: ақпаратты талдау, бағалау, дәлелдеу және ой елегінен өткізу.";
  if(baseK.includes("шульман")) return "Дұрыс жауап Шульман моделіндегі кәсіби түсінік, тәжірибелік дағды және кәсіби тұтастықпен байланысты.";
  if(baseK.includes("маслоу") || baseK.includes("роджерс")) return "Дұрыс жауап гуманистік тәсілге қатысты: онда тұлғалық өсу, уәж және адамның қажеттіліктері маңызды.";
  if(baseK.includes("пиаже")) return "Дұрыс жауап когнитивті даму және Жан Пиаже идеяларымен байланысты.";
  if(baseK.includes("мерсер")) return "Дұрыс жауап Мерсердің әңгіме түрлері, талқылау және ұжымдық білім құру туралы зерттеулерімен байланысты.";
  if(baseK.includes("есте сақтау") || baseK.includes("жады")) return "Дұрыс жауап есте сақтау үдерістері және ақпаратты сақтау тәсілдерімен байланысты.";
  return "Бұл жауап сұрақтағы негізгі педагогикалық ұғымға сәйкес келеді.";
}

function checkVariant(vi){
  const variant = DATA[vi];
  const box = document.getElementById("result-" + vi);

  let score = 0;
  let html = "";

  variant.items.forEach((item, qi) => {
    const selected = document.querySelector(`input[name="v${vi}-q${qi}"]:checked`);
    const selectedValue = selected ? selected.value : "";
    const ok = norm(selectedValue) === norm(item.a);

    if(ok) score++;

    const selectedOpt = selectedValue
      ? item.options.find(o => norm(o.k) === norm(selectedValue))
      : null;

    const correctOpt = item.options.find(o => norm(o.k) === norm(item.a)) || item.options[0];

    const yourAnswer = selectedOpt
      ? `${optText(selectedOpt)}`
      : t("noAnswer");

    const correctAnswer = optText(correctOpt);

    html += `
      <div class="ans ${ok ? "ok" : "bad"}">
        <div><b>${qi + 1}. ${itemQuestion(item)}</b></div>

        <div class="${ok ? "oktxt" : "badtxt"}">
          ${ok ? t("correct") : t("wrong")}
        </div>

        <div class="ex">
          <b>${t("yourAnswer")}</b><br>
          ${yourAnswer}
        </div>

        <div class="ex">
          <b>${t("correctAnswer")}</b><br>
          ${correctAnswer}
        </div>

        <div class="ex">
          <b>${t("explanation")}</b><br>
          ${evidence(item, correctOpt)}
        </div>
      </div>
    `;
  });

  const percent = Math.round((score / variant.items.length) * 100);

  box.innerHTML = `
    <div class="summary">
      <h3>${score} / ${variant.items.length} ${t("scoreWord")}</h3>
      <p>${t("result")} <b>${percent}%</b></p>
    </div>

    ${html}
  `;

  box.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
}

  if(

    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k)) ||
    (e.ctrlKey && ["U","S","P","A","C"].includes(k))
  ){
    e.preventDefault();
  }
});
